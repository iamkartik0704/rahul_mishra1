<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="r" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"/>
    </filter>
  </defs>
  <!-- whiteboard canvas -->
  <rect width="32" height="32" rx="6" fill="#fbfbf9"/>
  <!-- faint grid dots -->
  <g fill="#cbd5e1">
    <circle cx="8" cy="8" r="1"/><circle cx="16" cy="8" r="1"/><circle cx="24" cy="8" r="1"/>
    <circle cx="8" cy="24" r="1"/><circle cx="24" cy="24" r="1"/>
  </g>
  <!-- hand-drawn sticky note, tilted -->
  <g filter="url(#r)" transform="rotate(-5 16 16)">
    <rect x="6" y="6" width="20" height="20" rx="2" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4"/>
  </g>
  <!-- marker "RM" -->
  <text x="16" y="21" text-anchor="middle" font-family="'Caveat','Comic Sans MS',cursive"
        font-size="14" font-weight="700" fill="#1e40af">RM</text>
</svg>
